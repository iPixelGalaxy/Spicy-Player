name: Build Mobile

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Build Android, iOS, or both"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - android
          - ios
      android_variant:
        description: "Android Gradle variant"
        required: true
        default: "Release"
        type: choice
        options:
          - Debug
          - Release
      ios_export:
        description: "iOS output type"
        required: true
        default: "ipa"
        type: choice
        options:
          - ipa
          - simulator-app
      ios_export_method:
        description: "Export method for IPA builds"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - ad-hoc
          - app-store

jobs:
  android:
    if: ${{ inputs.platform == 'both' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android artifact
        run: gradle app:assemble${{ inputs.android_variant }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ inputs.android_variant }}
          path: app/build/outputs/apk/${{ fromJSON('{"Debug":"debug","Release":"release"}')[inputs.android_variant] }}/*.apk

  ios:
    if: ${{ inputs.platform == 'both' || inputs.platform == 'ios' }}
    runs-on: macos-latest
    permissions:
      contents: read

    env:
      IOS_SCHEME: SpicyPlayeriOS
      IOS_PROJECT: ios/SpicyPlayeriOS.xcodeproj
      IOS_BUNDLE_ID: com.tx24.spicyplayer

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec ios/project.yml --project ios/SpicyPlayeriOS.xcodeproj

      - name: Build simulator app
        if: ${{ inputs.ios_export == 'simulator-app' }}
        run: |
          xcodebuild \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package simulator app
        if: ${{ inputs.ios_export == 'simulator-app' }}
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*Build/Products/Release-iphonesimulator/Spicy Player.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Simulator .app not found."
            exit 1
          fi
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" artifacts/spicy-player-ios-simulator-app.zip

      - name: Upload simulator app
        if: ${{ inputs.ios_export == 'simulator-app' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: artifacts/spicy-player-ios-simulator-app.zip

      - name: Validate signing secrets
        if: ${{ inputs.ios_export == 'ipa' }}
        run: |
          test -n "${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}" || (echo "Missing IOS_CERTIFICATE_P12_BASE64" && exit 1)
          test -n "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" || (echo "Missing IOS_CERTIFICATE_PASSWORD" && exit 1)
          test -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" || (echo "Missing IOS_PROVISIONING_PROFILE_BASE64" && exit 1)
          test -n "${{ secrets.IOS_TEAM_ID }}" || (echo "Missing IOS_TEAM_ID" && exit 1)
          test -n "${{ secrets.IOS_SIGNING_IDENTITY }}" || (echo "Missing IOS_SIGNING_IDENTITY" && exit 1)

      - name: Install signing certificate and profile
        if: ${{ inputs.ios_export == 'ipa' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/spicy-player-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive iOS app
        if: ${{ inputs.ios_export == 'ipa' }}
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
          CODE_SIGN_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
        run: |
          xcodebuild \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/SpicyPlayeriOS.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Export IPA
        if: ${{ inputs.ios_export == 'ipa' }}
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.ios_export_method }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/SpicyPlayeriOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/exported-ios" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        if: ${{ inputs.ios_export == 'ipa' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/exported-ios/*.ipa
